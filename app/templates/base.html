<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RuneScape Compare{% endblock %}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        h1, h2 { color: #ffd700; }
        a { color: #ffd700; text-decoration: none; }
        a:hover { text-decoration: underline; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; }
        .error { color: #ff6b6b; padding: 10px; background: #2a1a1a; border-radius: 4px; }
        form { margin: 20px 0; }
        input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #16213e;
            color: #e0e0e0;
            font-size: 14px;
        }
        button {
            padding: 8px 16px;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        button:hover { background: #ffed4a; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th { color: #ffd700; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Lookup</a>
        <a href="/compare">Compare</a>
    </nav>
    <h1>RuneScape Compare</h1>
    {% block content %}{% endblock %}
</body>
</html>
